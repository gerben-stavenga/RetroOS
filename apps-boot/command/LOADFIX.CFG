# LOADFIX.CFG -- per-program launch overrides for COMMAND.COM.
#
# Format: BASENAME [keyword [keyword...]]
# Keywords (default = loadfix if none given):
#   loadfix  Run via the LOADFIX trampoline: COMMAND.COM re-forks with /L,
#            the child claims ~63 KB low and EXECs the program so its PSP
#            lands above segment 0x1000. Dodges EXEPACK's load-low bug.
#   dos32a   Wrap with DOS/32A: launch C:\DOS32A.EXE <prog> <args>. Use
#            for DOS/4GW programs that don't behave under our DPMI host.
#            Why: DOS/4GW historically runs the client at CPL=0 (predates
#            DPMI proper) and its built-in #GP handler returns through an
#            iret-frame with RPL=0 selectors. Our DPMI is spec-compliant
#            and runs the client at CPL=3, so the kernel-side IRET to a
#            RPL=0 user CS #GPs in ring 0 (err=selector). DOS/32A is
#            spec-compliant CPL=3 throughout and has no such issue.
# Virtual-IF mode. At CPL>IOPL a POPF/IRET does not fault, it silently drops the
# IF bit, so a client that re-enables interrupts that way is invisible to the
# monitor. Three modes, in ascending order of how hard we work to see it:
#
#   (none)   iopl1 -- spec-strict: POPF/IRET ignored, as DPMI 0.9 2.13 permits.
#            Free, and correct for a conforming client. A client that DOES
#            re-enable IF the sloppy way HANGS here: virtual IF sticks at 0, the
#            timer never delivers, and tick-paced delay loops deadlock.
#   repair   Honor POPF/IRET, caught by a hardware exit breakpoint. The monitor
#            single-steps a section ONCE to learn where it re-enables IF, then
#            breakpoints that address and lets the section run at full speed.
#            Costs a few #DB per second. This is what games want.
#   iopl3    Honor POPF/IRET by single-stepping the whole interrupts-off section
#            -- a #DB per instruction, ~2500x slower. The always-correct
#            reference path, which never predicts anything: keep it as the
#            escape hatch for a client `repair` mispredicts.
#
# Comments start with # or ;. Names are case-insensitive.
CHESS.EXE    loadfix repair
CALGAMES.EXE loadfix repair
TDH.EXE      loadfix repair
DIGGER.COM   loadfix repair
CAT.EXE      loadfix repair
GAME.EXE     loadfix repair
DOOM.EXE     repair
DOOM2.EXE    repair
HEXEN.EXE    repair
DUKE3D.EXE   repair
ROTT.EXE     repair
# The rest of the shipped games — DPMI and real-mode alike. The virtual-IF gate
# is PM-only, so an entry is a no-op for the 16-bit ones; they are listed so the
# policy is "every game runs in repair mode" rather than a list to keep in sync.
QUAKE.EXE    repair
WOLF3D.EXE   repair
HOCUS.EXE    repair
RAP.EXE      repair
KEEN1.EXE    repair
KEEN4E.EXE   repair
SKYROADS.EXE repair
DIGGER.EXE   repair
DEMO.EXE     repair
WW.EXE       repair
DM.EXE       repair