name: CI

# Gate every branch and PR: build, clippy (deny-warnings), and the hosted
# (interpreter) end-to-end tests — no QEMU/KVM needed, so it runs on any
# GitHub-hosted runner. Make this a required status check in branch protection
# to keep main green.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-clippy-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # The ~14 GB runner disk is the CI's real constraint: the restored bazel
      # disk cache + rust toolchain fetch + build outputs overflowed it, and a
      # full disk fails in maximally confusing ways (build_tar exit 1 with no
      # message on master; "No space left on device" mid-toolchain-fetch here).
      # Drop the preinstalled toolchains this build never uses (~10+ GB back).
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          df -h /

      # `nasm` for the test/dos `.COM` genrules (test/dos/*/BUILD.bazel shell
      # out to system nasm; the bootloader uses hermetic rules_nasm instead).
      # ubuntu-latest doesn't ship nasm, so //:image's analysis fails without it.
      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazelisk \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazelisk
          sudo ln -sf /usr/local/bin/bazelisk /usr/local/bin/bazel

      # Bazel's downloaded toolchains (nightly rustc, crates) and the analysis/
      # action cache. Keyed on the dependency-defining files so a lockfile bump
      # busts it. The disk_cache path is set in the CI bazelrc below.
      - name: Cache bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'Cargo.lock', '.bazelrc', 'toolchain/**') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: CI bazelrc (disk + repository cache)
        run: |
          cat >> .bazelrc <<'EOF'

          # --- CI overrides (appended by .github/workflows/ci.yml) ---
          build --disk_cache=~/.cache/bazel-disk
          build --repository_cache=~/.cache/bazel-repo
          build --keep_going
          EOF

      - name: Build kernel + disk image
        run: bazel build //:image //kernel:kernel_elf

      # clippy runs under -D warnings via the rules_rust aspect (--config=clippy),
      # so any diagnostic fails the build. Metal crates lint on the default
      # platform; host-only crates need --platforms=@platforms//host.
      - name: Clippy (metal crates)
        run: |
          bazel build --config=clippy \
            //kernel:kernel //lib:lib //arch-abi:arch-abi //arch-metal:arch-metal

      - name: Clippy (host crates)
        run: |
          bazel build --config=clippy --platforms=@platforms//host \
            //kernel:kernel //kernel:retroos-host \
            //arch-interp:arch-interp //lib:lib //arch-abi:arch-abi

      - name: Build hosted runner
        run: bazel build //kernel:retroos-host --platforms=@platforms//host

      # End-to-end: a real 32-bit Linux ELF through the kernel's Linux
      # personality on the software CPU.
      - name: Hosted ELF smoke
        run: |
          gcc -m32 -static -nostdlib -no-pie -fno-pic -O2 -e _start \
            -o /tmp/hello.elf test/hosted/hello.c
          # The program prints its greeting then exit(0)s; cap with timeout.
          out=$(timeout 20 bazel-bin/kernel/retroos-host /tmp/hello.elf 2>&1 || true)
          echo "$out"
          echo "$out" | grep -q "Hello from an interpreted 32-bit Linux ELF!"
          # ...and it must exit cleanly — no kernel panic behind the greeting.
          if echo "$out" | grep -q "panicked"; then echo "kernel panicked on the bare-ELF path"; exit 1; fi

      # End-to-end test suite via the single aggregator (test/run_all.sh). On a
      # GitHub-hosted runner it runs the hosted-TCG tests (hosted_games, dpmi_hx)
      # and auto-skips the QEMU/KVM/proprietary ones; a local run covers all.
      # New tests are wired up by adding a line to test/run_all.sh.
      - name: End-to-end tests
        run: test/run_all.sh

      # Cap the disk cache BEFORE the post-job cache save: it only ever grows
      # (every lockfile bump saves a bigger cache under a new key), and once
      # restored-cache + toolchains + outputs exceed the runner disk, builds
      # die with ENOSPC in whatever action happens to write next. Keep the
      # newest ~3 GiB by access time; drop the tail.
      - name: Trim bazel disk cache
        if: always()
        run: |
          if [ -d ~/.cache/bazel-disk ]; then
            du -sh ~/.cache/bazel-disk || true
            # Cache entries are content-hash filenames — no spaces, plain text safe.
            find ~/.cache/bazel-disk -type f -printf '%A@ %s %p\n' 2>/dev/null | \
              sort -rn | \
              awk -v budget=$((3*1024*1024*1024)) '{tot+=$2; if (tot>budget) print $3}' | \
              xargs -r rm -f
            du -sh ~/.cache/bazel-disk || true
          fi
          df -h /
