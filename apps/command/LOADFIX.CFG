# LOADFIX.CFG -- basenames that need a low dummy alloc before EXEC.
#
# COMMAND.COM reads this on startup. Programs listed here are run via
# the LOADFIX trampoline: parent forks COMMAND.COM with /L, the child
# allocs ~63 KB low and EXECs the program, so its PSP lands above
# segment 0x1000 and EXEPACK's load-low relocator bug is dodged.
#
# One basename per line. Comments start with # or ;. Case-insensitive.
CHESS.EXE
CALGAMES.EXE
