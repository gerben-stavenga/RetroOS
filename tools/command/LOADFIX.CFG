# LOADFIX.CFG -- per-program launch overrides for COMMAND.COM.
#
# KEEP EVERY LINE UNDER 78 CHARS, COMMENTS INCLUDED. The parser reads with
# fgets() into a fixed buffer; a longer line arrives in pieces, and the tail
# does not start with '#', so it lands in the table as a bogus program entry
# and shifts the real ones out. A long COMMENT can therefore silently drop a
# game's flags -- DOOM lost its `repair` that way, fell back to the legacy
# loadfix default at vIOPL=1, and hung at DMX_Init with virtual IF stuck off.
# COMMAND.COM now rejects overlong lines, but keep them short anyway.
#
# Format: BASENAME [keyword [keyword...]]
# Keywords (default = loadfix if none given):
#
#   loadfix  Run via the LOADFIX trampoline: COMMAND.COM re-forks with /L,
#            the child claims ~63 KB low and EXECs the program so its PSP
#            lands above segment 0x1000. Dodges EXEPACK's load-low bug.
#
#   dos32a   Wrap with DOS/32A: launch C:\DOS32A.EXE <prog> <args>. For
#            DOS/4GW programs that don't behave under our DPMI host: DOS/4GW
#            runs the client at CPL=0 and returns through an iret-frame with
#            RPL=0 selectors; we are spec-compliant CPL=3, so that IRET #GPs
#            in ring 0. DOS/32A is CPL=3 throughout.
#
# Virtual-IF mode. At CPL>IOPL a POPF/IRET does NOT fault -- it silently
# drops the IF bit -- so a client re-enabling interrupts that way is
# invisible to the monitor. Three modes, by ascending effort:
#
#   (none)   Spec-strict: POPF/IRET ignored, as DPMI 0.9 2.13 permits. Free,
#            and correct for a conforming client. One that DOES re-enable IF
#            the sloppy way HANGS: virtual IF sticks at 0, the timer never
#            delivers, and tick-paced loops deadlock.
#
#   repair   Honor POPF/IRET, caught by a hardware exit breakpoint. The
#            monitor steps a section ONCE to learn where it re-enables IF,
#            then breakpoints that address and lets it run at full speed.
#            Costs a few #DB per second. This is what the DPMI games want.
#
#   iopl3    Honor POPF/IRET by single-stepping the whole interrupts-off
#            section -- a #DB per instruction, ~2500x slower. The
#            always-correct reference path, which never predicts anything:
#            the escape hatch for a client `repair` mispredicts.
#
# Comments start with # or ;. Names are case-insensitive.
CHESS.EXE    loadfix
CALGAMES.EXE loadfix
TDH.EXE      loadfix
DIGGER.COM   loadfix
CAT.EXE      loadfix
GAME.EXE     loadfix
DOOM.EXE     repair
DOOM2.EXE    repair
HEXEN.EXE    repair
DUKE3D.EXE   repair
ROTT.EXE     repair
QUAKE.EXE    repair
WOLF3D.EXE   repair
HOCUS.EXE    repair
RAP.EXE      repair
KEEN1.EXE    repair
KEEN4E.EXE   repair
SKYROADS.EXE repair
DIGGER.EXE   repair
DEMO.EXE     repair
WW.EXE       repair
DM.EXE       repair
